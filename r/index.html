<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: sans-serif;
      color: #fff;
    }
    .msg { text-align: center; opacity: 0.5; font-size: 14px; }
  </style>
</head>
<body>
  <div class="msg">Redirigiendo...</div>
  <script>
    (async () => {
      // Obtener el ID de la tarjeta desde la URL: /r/001 → "001"
      const parts = window.location.pathname.split('/').filter(Boolean);
      const cardId = parts[parts.length - 1];

      if (!cardId) {
        document.querySelector('.msg').textContent = 'Tarjeta no especificada.';
        return;
      }

      try {
        // Cargar el archivo de configuración
        const res = await fetch('../cards.json');
        const cards = await res.json();

        const url = cards[cardId];

        if (url) {
          window.location.replace(url);
        } else {
          document.querySelector('.msg').textContent = 'Esta tarjeta aún no está configurada.';
        }
      } catch (e) {
        document.querySelector('.msg').textContent = 'Error al cargar configuración.';
      }
    })();
  </script>
</body>
</html>
